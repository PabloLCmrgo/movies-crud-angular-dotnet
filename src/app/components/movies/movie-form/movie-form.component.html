<div class="container py-4 form-container">
  <h2 class="mb-4">{{ isEdit() ? 'Editar' : 'Nueva' }} Película</h2>

  @if (error()) {
    <div class="alert alert-danger" role="alert">{{ error() }}</div>
  }

  <div class="card shadow-sm">
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="save()" novalidate>
        <div class="mb-3">
          <label for="name" class="form-label">Nombre</label>
          <input
            id="name"
            type="text"
            class="form-control"
            formControlName="name"
            [class.is-invalid]="form.controls.name.invalid && form.controls.name.touched" />
          <div class="invalid-feedback">El nombre es obligatorio (mínimo 2 caracteres).</div>
        </div>

        <div class="mb-3">
          <label for="releaseYear" class="form-label">Año de estreno</label>
          <input
            id="releaseYear"
            type="date"
            class="form-control"
            formControlName="releaseYear"
            [class.is-invalid]="form.controls.releaseYear.invalid && form.controls.releaseYear.touched" />
          <div class="invalid-feedback">La fecha de estreno es obligatoria.</div>
        </div>

        <div class="mb-3">
          <label for="genre" class="form-label">Género</label>
          <input
            id="genre"
            type="text"
            class="form-control"
            formControlName="genre"
            [class.is-invalid]="form.controls.genre.invalid && form.controls.genre.touched" />
          <div class="invalid-feedback">El género es obligatorio.</div>
        </div>

        <div class="mb-3">
          <label for="duration" class="form-label">Duración (HH:mm:ss)</label>
          <input
            id="duration"
            type="text"
            class="form-control"
            formControlName="duration"
            placeholder="02:15:00"
            [class.is-invalid]="form.controls.duration.invalid && form.controls.duration.touched" />
          <div class="invalid-feedback">Formato esperado: HH:mm:ss (ej. 02:15:00).</div>
        </div>

        <div class="mb-3">
          <label for="directorId" class="form-label">Director</label>
          <select
            id="directorId"
            class="form-select"
            formControlName="directorId"
            [class.is-invalid]="form.controls.directorId.invalid && form.controls.directorId.touched">
            <option [ngValue]="null" disabled>Seleccione un director</option>
            @for (d of directors(); track d.id) {
              <option [ngValue]="d.id">{{ d.name }}</option>
            }
          </select>
          <div class="invalid-feedback">Debe seleccionar un director.</div>
        </div>

        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary" [disabled]="saving()">
            @if (saving()) {
              <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
            }
            {{ saving() ? 'Guardando…' : 'Guardar' }}
          </button>
          <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="saving()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
</div>
